services:
  db:
    image: postgres:16-alpine
    container_name: memlyra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: memlyra
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: memlyra
    volumes:
      - memlyra_pg:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql

  app:
    build: .
    container_name: memlyra
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      DATABASE_URL: postgres://memlyra:${POSTGRES_PASSWORD}@db:5432/memlyra
      SESSION_SECRET: ${SESSION_SECRET}
      ORIGIN: ${ORIGIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      NODE_ENV: production
    depends_on:
      - db

volumes:
  memlyra_pg:
