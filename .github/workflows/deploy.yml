name: Deploy MemLyra

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy MemLyra on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            if [ ! -d /root/MemLyra ]; then
              echo "ERROR: /root/MemLyra missing on server"
              exit 1
            fi

            cd /root/MemLyra
            git fetch origin
            git reset --hard origin/main
            docker compose up -d --build

            if [ -f deploy/nginx/memlyra.conf ]; then
              cp deploy/nginx/memlyra.conf /etc/nginx/sites-available/memlyra
              ln -sfn /etc/nginx/sites-available/memlyra /etc/nginx/sites-enabled/memlyra
            fi

            systemctl start nginx
            nginx -t
            systemctl reload nginx

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            curl -s -o /dev/null -w "memlyra local %{http_code}\n" -H "Host: memlyra.com" http://127.0.0.1/ || true
