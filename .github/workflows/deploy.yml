name: Deploy MemLyra

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Start MemLyra on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -e
            # Ensure nothing stole host :80 from nginx
            docker ps -q --filter publish=80 | xargs -r docker rm -f || true
            systemctl start nginx || true

            if [ ! -d /root/MemLyra ]; then
              echo "ERROR: /root/MemLyra missing — clone the repo on the server first"
              exit 1
            fi

            cd /root/MemLyra
            git fetch origin
            git reset --hard origin/main
            docker compose up -d --build

            if [ -f deploy/nginx/memlyra.conf ]; then
              cp deploy/nginx/memlyra.conf /etc/nginx/sites-available/memlyra
              ln -sfn /etc/nginx/sites-available/memlyra /etc/nginx/sites-enabled/memlyra
            fi
            nginx -t && systemctl reload nginx

            docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}'
            ss -tlnp | grep -E ':3001|:80|:443' || true
            curl -s -o /dev/null -w "local memlyra %{http_code}\n" -H "Host: memlyra.com" http://127.0.0.1/ || true
